<h1>Verify Email</h1>

<form method="POST">
    {% csrf_token %}

    <label for="otp">Enter OTP</label>

    <input
        type="text"
        name="otp"
        id="otp"
        maxlength="6"
        required
    >

    <button type="submit">
        Verify
    </button>
</form>

{% if error %}
    <p>{{ error }}</p>
{% endif %}
