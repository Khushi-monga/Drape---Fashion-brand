{% load static %}

<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>

        {% block title %}
            Marketplace
        {% endblock %}

    </title>

    <!-- Tailwind -->

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    >

    <!-- Global CSS -->

    <link
        rel="stylesheet"
        href="{% static 'css/base.css' %}"
    >

    <!-- Page Specific CSS -->

    {% block extra_css %}
    {% endblock %}

</head>

<body class="bg-stone-50 text-neutral-900 antialiased">

    <!-- =========================
         PAGE
    ========================== -->

    {% block content %}
    {% endblock %}

    <!-- =========================
         GLOBAL JS
    ========================== -->

    <script src="{% static 'js/base.js' %}"></script>

    <!-- Page Specific JS -->

    {% block extra_js %}
    {% endblock %}

</body>

</html>
