{% for product in products %}

<div class="product-card">

    <a href="{{ product.get_absolute_url }}">

        <img
            src="{{ product.image.url }}"
            alt="{{ product.name }}"
        >

        <div class="product-info">

            <p class="brand">
                {{ product.brand.name }}
            </p>

            <h3>
                {{ product.name }}
            </h3>

            <p class="category">
                {{ product.category.name }}
            </p>

            <div class="price-row">

                <span class="price">
                    ₹{{ product.price }}
                </span>

            </div>

        </div>

    </a>

</div>

{% endfor %}
